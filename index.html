<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code — Tournoi de Belote</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', serif;
    background: #1c1917;
    color: #e7e5e4;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .card {
    background: #fdf8f2;
    color: #1c1917;
    border-radius: 16px;
    padding: 2.5rem 3rem;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    max-width: 420px;
    width: 100%;
  }
  .suits {
    font-size: 1.8rem;
    letter-spacing: 0.3em;
    margin-bottom: 1rem;
  }
  .suits .red { color: #b91c1c; }
  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: #0f0a0a;
    margin-bottom: 0.3rem;
  }
  h1 span { color: #b91c1c; }
  .subtitle {
    font-size: 0.85rem;
    color: #78716c;
    margin-bottom: 1.8rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  #qrcode {
    display: flex;
    justify-content: center;
    margin-bottom: 1.5rem;
  }
  #qrcode canvas, #qrcode img {
    border-radius: 8px;
    border: 6px solid #0f0a0a;
  }
  .url {
    font-size: 0.72rem;
    color: #a8a29e;
    word-break: break-all;
    margin-bottom: 1.5rem;
    font-family: monospace;
    background: #f5f0e8;
    padding: 0.5rem 0.8rem;
    border-radius: 6px;
  }
  .btn-dl {
    display: inline-block;
    background: #b91c1c;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.7rem 1.6rem;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    font-family: Georgia, serif;
    transition: background 0.2s;
  }
  .btn-dl:hover { background: #7f1d1d; }
  .footer-suits {
    margin-top: 1.5rem;
    font-size: 1rem;
    color: #d97706;
    letter-spacing: 0.5em;
  }
</style>
</head>
<body>
<div class="card">
  <div class="suits">
    <span class="red">♥</span> ♠ <span class="red">♦</span> ♣
  </div>
  <h1>Tournoi de <span>Belote</span></h1>
  <div class="subtitle">US Seignelay — Scannez pour accéder</div>

  <div id="qrcode"></div>

  <div class="url">valentinpar.github.io/Belote-US-SEIGNELAY/</div>

  <button class="btn-dl" onclick="telecharger()">⬇ Télécharger le QR Code</button>

  <div class="footer-suits">♠ ♥ ♦ ♣</div>
</div>

<script>
const url = "https://valentinpar.github.io/Belote-US-SEIGNELAY/";

const qr = new QRCode(document.getElementById("qrcode"), {
  text: url,
  width: 240,
  height: 240,
  colorDark: "#0f0a0a",
  colorLight: "#fdf8f2",
  correctLevel: QRCode.CorrectLevel.M
});

function telecharger() {
  setTimeout(() => {
    const canvas = document.querySelector('#qrcode canvas');
    if (canvas) {
      const link = document.createElement('a');
      link.download = 'qrcode-tournoi-belote.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  }, 100);
}
</script>
</body>
</html>
