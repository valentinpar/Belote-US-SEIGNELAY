<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Seignelay — Événements</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --vert: #1a5c2a;
    --vert-fonce: #0d3318;
    --vert-clair: #2d8a45;
    --vert-pale: #86efac;
    --or: #d4a017;
    --or-clair: #fef3c7;
    --noir: #0a0f0a;
    --gris-fonce: #111811;
    --gris: #1e2a1e;
    --gris-moyen: #2d3f2d;
    --texte-clair: #e7f0e7;
    --texte-muted: #8aaa8a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Source Sans 3', sans-serif; background: var(--gris-fonce); color: var(--texte-clair); min-height: 100vh; }

  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--noir) 0%, var(--vert-fonce) 50%, var(--noir) 100%);
    padding: 2.5rem 2rem 2rem; text-align: center; border-bottom: 3px solid var(--or);
    position: relative; overflow: hidden;
  }
  header::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(26,92,42,0.3) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-logo { width: 90px; height: 90px; margin-bottom: 1rem; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6)); }
  header h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem,5vw,2.8rem); font-weight: 900; color: var(--texte-clair); text-shadow: 2px 2px 10px rgba(0,0,0,0.7); }
  header h1 span { color: var(--or); }
  header p { color: var(--vert-pale); font-size: 0.85rem; margin-top: 0.4rem; letter-spacing: 0.12em; text-transform: uppercase; }

  /* BOUTON ADMIN */
  .admin-btn {
    position: absolute; top: 1rem; right: 1rem;
    background: none; border: none; cursor: pointer; padding: 0;
    transition: transform 0.2s;
  }
  .admin-btn img { width: 42px; height: 42px; border-radius: 50%; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5)); }
  .admin-btn:hover { transform: scale(1.1); }

  /* MAIN */
  main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* SECTION TITRE */
  .section-titre {
    display: flex; align-items: center; gap: 0.75rem;
    font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700;
    color: var(--or); margin-bottom: 1.5rem; padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--gris-moyen);
  }

  /* CARTES ÉVÉNEMENTS */
  .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.2rem; }
  .event-card {
    background: var(--gris); border: 1px solid var(--gris-moyen);
    border-radius: 12px; overflow: hidden; cursor: pointer;
    transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    display: flex; flex-direction: column;
  }
  .event-card:hover { transform: translateY(-4px); border-color: var(--or); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
  .event-card-banner {
    background: linear-gradient(135deg, var(--vert-fonce), var(--vert));
    padding: 1.2rem 1.2rem 1rem; position: relative; overflow: hidden;
  }
  .event-card-banner::after {
    content: ''; position: absolute; bottom: -20px; right: -20px;
    width: 80px; height: 80px; background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }
  .event-type-badge {
    display: inline-block; font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; padding: 0.2rem 0.6rem; border-radius: 20px; margin-bottom: 0.6rem;
  }
  .badge-belote { background: rgba(185,28,28,0.3); color: #fca5a5; border: 1px solid rgba(185,28,28,0.5); }
  .badge-foot   { background: rgba(26,92,42,0.5); color: var(--vert-pale); border: 1px solid rgba(45,138,69,0.5); }
  .badge-petanque { background: rgba(139,105,20,0.3); color: #e8d088; border: 1px solid rgba(139,105,20,0.5); }
  .badge-autre  { background: rgba(212,160,23,0.2); color: var(--or); border: 1px solid rgba(212,160,23,0.4); }
  .event-card-titre { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--texte-clair); }
  .event-card-body { padding: 1rem 1.2rem; flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
  .event-meta { display: flex; align-items: center; gap: 0.4rem; font-size: 0.82rem; color: var(--texte-muted); }
  .event-meta strong { color: var(--texte-clair); }
  .event-desc { font-size: 0.85rem; color: var(--texte-muted); line-height: 1.5; flex: 1; }
  .event-card-footer { padding: 0.8rem 1.2rem; border-top: 1px solid var(--gris-moyen); display: flex; justify-content: flex-end; }
  .btn-voir { background: var(--vert-clair); color: white; border: none; border-radius: 6px; padding: 0.45rem 1rem; font-size: 0.82rem; font-weight: 700; cursor: pointer; font-family: 'Source Sans 3', sans-serif; transition: background 0.2s; }
  .btn-voir:hover { background: var(--vert); }
  .btn-voir.belote { background: #b91c1c; }
  .btn-voir.belote:hover { background: #7f1d1d; }
  .btn-voir.foot { background: #1a5c2a; }
  .btn-voir.foot:hover { background: #0d3318; }
  .btn-voir.petanque { background: #8B6914; }
  .btn-voir.petanque:hover { background: #5C4610; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 3rem; color: var(--texte-muted); }
  .empty-state .icon { font-size: 3rem; margin-bottom: 0.75rem; }

  /* MODAL ÉVÉNEMENT */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--gris); border: 1px solid var(--or); border-radius: 14px;
    width: min(500px, 95vw); box-shadow: 0 20px 60px rgba(0,0,0,0.7); overflow: hidden;
    animation: popIn 0.2s ease;
  }
  @keyframes popIn { from { opacity:0; transform:scale(0.95) translateY(10px); } to { opacity:1; transform:none; } }
  .modal-banner {
    background: linear-gradient(135deg, var(--vert-fonce), var(--vert));
    padding: 1.5rem 1.5rem 1.2rem;
  }
  .modal-banner h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--texte-clair); margin-top: 0.5rem; }
  .modal-body { padding: 1.5rem; }
  .modal-info { display: flex; flex-direction: column; gap: 0.7rem; margin-bottom: 1.2rem; }
  .modal-info-row { display: flex; gap: 0.6rem; align-items: flex-start; font-size: 0.88rem; }
  .modal-info-row .label { color: var(--texte-muted); min-width: 70px; }
  .modal-info-row .val { color: var(--texte-clair); font-weight: 600; }
  .modal-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .btn-modal-belote { background: #b91c1c; color: white; border: none; border-radius: 7px; padding: 0.65rem 1.3rem; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: 'Source Sans 3', sans-serif; transition: background 0.2s; display: flex; align-items: center; gap: 0.4rem; }
  .btn-modal-belote:hover { background: #7f1d1d; }
  .btn-modal-foot { background: #1a5c2a; color: white; border: none; border-radius: 7px; padding: 0.65rem 1.3rem; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: 'Source Sans 3', sans-serif; transition: background 0.2s; display: flex; align-items: center; gap: 0.4rem; }
  .btn-modal-foot:hover { background: #0d3318; }
  .btn-modal-petanque { background: #8B6914; color: white; border: none; border-radius: 7px; padding: 0.65rem 1.3rem; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: 'Source Sans 3', sans-serif; transition: background 0.2s; display: flex; align-items: center; gap: 0.4rem; }
  .btn-modal-petanque:hover { background: #5C4610; }
  .btn-modal-close { background: var(--gris-moyen); color: var(--texte-muted); border: none; border-radius: 7px; padding: 0.65rem 1.3rem; font-size: 0.9rem; cursor: pointer; font-family: 'Source Sans 3', sans-serif; transition: background 0.2s; }
  .btn-modal-close:hover { background: var(--gris-fonce); color: var(--texte-clair); }

  /* MODAL LOGIN */
  .modal-login { background: var(--gris); border: 1px solid var(--or); border-radius: 14px; padding: 2rem; width: min(360px,92vw); text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.7); }
  .modal-login .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .modal-login h3 { font-family: 'Playfair Display', serif; color: var(--or); font-size: 1.3rem; margin-bottom: 0.4rem; }
  .modal-login p { color: var(--texte-muted); font-size: 0.85rem; margin-bottom: 1.2rem; }
  .pwd-wrap { position: relative; margin-bottom: 0.8rem; }
  .pwd-wrap input { width: 100%; background: var(--gris-fonce); border: 1px solid var(--gris-moyen); color: var(--texte-clair); padding: 0.6rem 2.5rem 0.6rem 0.9rem; border-radius: 6px; font-family: 'Source Sans 3', sans-serif; font-size: 0.92rem; }
  .pwd-wrap input:focus { outline: none; border-color: var(--or); }
  .pwd-eye { position: absolute; right: 0.6rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--texte-muted); cursor: pointer; }
  .btn-login { background: var(--vert-clair); color: white; border: none; border-radius: 7px; padding: 0.65rem 1.5rem; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: 'Source Sans 3', sans-serif; transition: background 0.2s; }
  .btn-login:hover { background: var(--vert); }
  .btn-cancel { background: var(--gris-moyen); color: var(--texte-muted); border: none; border-radius: 7px; padding: 0.65rem 1.2rem; font-size: 0.9rem; cursor: pointer; font-family: 'Source Sans 3', sans-serif; }
  .modal-error { color: #fca5a5; font-size: 0.82rem; min-height: 1.1rem; margin-bottom: 0.5rem; }
  .modal-hint { font-size: 0.75rem; color: #3d5c3d; margin-top: 1rem; }

  /* ADMIN PANEL */
  .admin-panel { display: none; background: var(--gris); border: 1px solid var(--gris-moyen); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
  .admin-panel.open { display: block; }
  .admin-panel h3 { font-family: 'Playfair Display', serif; color: var(--or); font-size: 1.1rem; margin-bottom: 1rem; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
  @media(max-width:500px) { .form-grid { grid-template-columns: 1fr; } }
  label { display: block; font-size: 0.78rem; color: var(--texte-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
  input, select, textarea { width: 100%; background: var(--gris-fonce); border: 1px solid var(--gris-moyen); color: var(--texte-clair); padding: 0.55rem 0.85rem; border-radius: 6px; font-family: 'Source Sans 3', sans-serif; font-size: 0.9rem; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--or); }
  textarea { resize: vertical; min-height: 70px; }
  .btn-add { background: var(--vert-clair); color: white; border: none; border-radius: 6px; padding: 0.6rem 1.3rem; font-weight: 700; cursor: pointer; font-family: 'Source Sans 3', sans-serif; font-size: 0.88rem; transition: background 0.2s; }
  .btn-add:hover { background: var(--vert); }
  .btn-del { background: #7f1d1d; color: white; border: none; border-radius: 5px; padding: 0.3rem 0.7rem; font-size: 0.76rem; cursor: pointer; font-family: 'Source Sans 3', sans-serif; }
  .btn-del:hover { background: #991b1b; }
  .btn-edit { background: #1a5c2a; color: white; border: none; border-radius: 5px; padding: 0.3rem 0.7rem; font-size: 0.76rem; cursor: pointer; font-family: 'Source Sans 3', sans-serif; }
  .btn-edit:hover { background: #2d8a45; }
  .btn-logout { background: transparent; border: 1px solid var(--gris-moyen); color: var(--texte-muted); border-radius: 6px; padding: 0.4rem 0.9rem; font-size: 0.8rem; cursor: pointer; font-family: 'Source Sans 3', sans-serif; transition: all 0.2s; }
  .btn-logout:hover { border-color: #b91c1c; color: #fca5a5; }
  .alert { padding: 0.6rem 1rem; border-radius: 6px; font-size: 0.85rem; margin-top: 0.75rem; }
  .alert-success { background: rgba(20,83,45,0.3); border: 1px solid #166534; color: var(--vert-pale); }
  .alert-warning { background: rgba(120,53,15,0.3); border: 1px solid #92400e; color: #fcd34d; }

  footer { text-align: center; padding: 1.5rem; color: #3d5c3d; font-size: 0.78rem; border-top: 1px solid var(--gris); margin-top: 2rem; }
</style>
</head>

<main>
  <div id="admin-panel" class="admin-panel">
    <h3>Gestion des Événements</h3>
    <div class="form-grid">
      <div>
        <label>Titre</label>
        <input type="text" id="ev-titre" placeholder="Ex: Tournoi de Belote">
      </div>
      <div>
        <label>Type</label>
        <select id="ev-type">
          <option value="belote">Belote</option>
          <option value="foot">Football</option>
          <option value="petanque">Pétanque</option>
          <option value="autre">Autre</option>
        </select>
      </div>
      <div>
        <label>Date</label>
        <input type="date" id="ev-date">
      </div>
      <div>
        <label>Heure</label>
        <input type="time" id="ev-heure">
      </div>
      <div style="grid-column: span 2;">
        <label>Description</label>
        <textarea id="ev-desc" placeholder="Détails de l'événement..."></textarea>
      </div>
    </div>
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <button class="btn-add" onclick="ajouterEvent()">Ajouter l'événement</button>
      <div id="admin-msg"></div>
    </div>
  </div>

  <div class="section-titre">
    <span>📅</span> Événements à venir
  </div>

  <div id="events-container" class="events-grid">
    </div>
</main>

<footer>
  &copy; 2024 US Seignelay — Tous droits réservés
</footer>

<div id="modal-login" class="modal-overlay">
  <div class="modal-login">
    <div class="icon">🛡️</div>
    <h3>Espace Admin</h3>
    <p>Saisissez le code d'accès pour gérer les événements.</p>
    <div id="login-err" class="modal-error"></div>
    <div class="pwd-wrap">
      <input type="password" id="pwd-input" placeholder="Code secret">
      <button class="pwd-eye" onclick="toggleEye()">👁️</button>
    </div>
    <div style="display:flex; gap:0.5rem; justify-content:center;">
      <button class="btn-cancel" onclick="fermerLogin()">Annuler</button>
      <button class="btn-login" onclick="connecter()">Connexion</button>
    </div>
    <div class="modal-hint">Accès réservé au bureau de l'USS.</div>
  </div>
</div>

<div id="modal-event" class="modal-overlay">
  <div id="modal-content" class="modal-box">
    </div>
</div>

<script>
let events = JSON.parse(localStorage.getItem('uss_events')) || [];
let connecte = false;

function renderEvents() {
  const container = document.getElementById('events-container');
  if (events.length === 0) {
    container.innerHTML = `
      <div class="empty-state" style="grid-column: 1/-1;">
        <div class="icon">🍃</div>
        <p>Aucun événement prévu pour le moment.</p>
      </div>`;
    return;
  }

  // Trier par date
  events.sort((a,b) => new Date(a.date) - new Date(b.date));

  container.innerHTML = events.map((ev, idx) => `
    <div class="event-card" onclick="ouvrirEvent(${idx})">
      <div class="event-card-banner">
        <span class="event-type-badge badge-${ev.type}">${ev.type}</span>
        <h3 class="event-card-titre">${ev.titre}</h3>
      </div>
      <div class="event-card-body">
        <div class="event-meta">
          <span>📅</span> <strong>${formaterDate(ev.date)}</strong> à ${ev.heure}
        </div>
        <p class="event-desc">${ev.description.substring(0, 80)}${ev.description.length > 80 ? '...' : ''}</p>
      </div>
      <div class="event-card-footer">
        ${connecte ? `
          <div style="display:flex; gap:0.5rem; width:100%; justify-content:space-between;">
             <button class="btn-del" onclick="supprimerEvent(event, ${idx})">Supprimer</button>
             <button class="btn-voir ${ev.type}">Détails</button>
          </div>
        ` : `<button class="btn-voir ${ev.type}">En savoir plus</button>`}
      </div>
    </div>
  `).join('');
}

function ajouterEvent() {
  const titre = document.getElementById('ev-titre').value;
  const type = document.getElementById('ev-type').value;
  const date = document.getElementById('ev-date').value;
  const heure = document.getElementById('ev-heure').value;
  const description = document.getElementById('ev-desc').value;

  if(!titre || !date || !heure) {
    flash(document.getElementById('admin-msg'), 'warning', 'Veuillez remplir les champs obligatoires');
    return;
  }

  events.push({ titre, type, date, heure, description });
  localStorage.setItem('uss_events', JSON.stringify(events));
  
  // Reset form
  document.getElementById('ev-titre').value = '';
  document.getElementById('ev-date').value = '';
  document.getElementById('ev-heure').value = '';
  document.getElementById('ev-desc').value = '';

  flash(document.getElementById('admin-msg'), 'success', 'Événement ajouté !');
  renderEvents();
}

function supprimerEvent(e, idx) {
  e.stopPropagation();
  if(confirm('Supprimer cet événement ?')) {
    events.splice(idx, 1);
    localStorage.setItem('uss_events', JSON.stringify(events));
    renderEvents();
  }
}

function ouvrirEvent(idx) {
  const ev = events[idx];
  const modal = document.getElementById('modal-event');
  const content = document.getElementById('modal-content');

  content.innerHTML = `
    <div class="modal-banner">
      <span class="event-type-badge badge-${ev.type}">${ev.type}</span>
      <h2>${ev.titre}</h2>
    </div>
    <div class="modal-body">
      <div class="modal-info">
        <div class="modal-info-row">
          <span class="label">DATE</span>
          <span class="val">${formaterDate(ev.date)}</span>
        </div>
        <div class="modal-info-row">
          <span class="label">HEURE</span>
          <span class="val">${ev.heure}</span>
        </div>
        <div class="modal-info-row">
          <span class="label">INFOS</span>
          <span class="val">${ev.description || 'Aucune description supplémentaire.'}</span>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-modal-close" onclick="fermerEvent()">Fermer</button>
        <button class="btn-modal-${ev.type}" onclick="alert('Inscription bientôt disponible')">
          S'inscrire à cet événement
        </button>
      </div>
    </div>
  `;
  modal.classList.add('open');
}

function fermerEvent() {
  document.getElementById('modal-event').classList.remove('open');
}

function ouvrirLogin() {
  if (connecte) {
    // Si déjà connecté, le bouton admin peut servir à scroller vers le panel ou autre
    return;
  }
  document.getElementById('modal-login').classList.add('open');
}

function fermerLogin() {
  document.getElementById('modal-login').classList.remove('open');
  document.getElementById('login-err').innerText = '';
  document.getElementById('pwd-input').value = '';
}

function connecter() {
  const p = document.getElementById('pwd-input').value;
  if (p === '2105') {
    connecte = true;
    localStorage.setItem('uss_admin', '1');
    document.getElementById('admin-panel').classList.add('open');
    document.getElementById('btn-admin').style.opacity = '0.4';
    document.getElementById('btn-deconnexion').style.display = 'block';
    // Affichage du bouton tournois
    document.getElementById('btn-tournois').style.display = 'inline-flex';
    fermerLogin();
    renderEvents();
  } else {
    document.getElementById('login-err').innerText = 'Code incorrect';
  }
}

function deconnecter() {
  connecte = false;
  localStorage.removeItem('uss_admin');
  document.getElementById('admin-panel').classList.remove('open');
  document.getElementById('btn-admin').style.opacity = '1';
  document.getElementById('btn-deconnexion').style.display = 'none';
  // Masquage du bouton tournois
  document.getElementById('btn-tournois').style.display = 'none';
  renderEvents();
}

function toggleEye() {
  const inp = document.getElementById('pwd-input');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function formaterDate(d) {
  const date = new Date(d);
  return date.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

function flash(el, type, msg) {
  el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  setTimeout(() => el.innerHTML = '', 3000);
}

// Reconnexion auto
if (localStorage.getItem('uss_admin') === '1') {
  connecte = true;
  document.getElementById('admin-panel').classList.add('open');
  document.getElementById('btn-admin').style.opacity = '0.4';
  document.getElementById('btn-deconnexion').style.display = 'block';
  document.getElementById('btn-tournois').style.display = 'inline-flex';
}

renderEvents();

// Fermer modal en cliquant dehors
window.onclick = function(event) {
  const m1 = document.getElementById('modal-login');
  const m2 = document.getElementById('modal-event');
  if (event.target == m1) fermerLogin();
  if (event.target == m2) fermerEvent();
}
</script>
